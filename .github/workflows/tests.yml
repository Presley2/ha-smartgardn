name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-homeassistant-custom-component pytest-asyncio freezegun

      - name: Run core module tests
        run: |
          python -m pytest tests/test_gts_calculator.py tests/test_water_balance.py tests/test_et0_calculator.py -v

      - name: Run refactored module tests
        run: |
          python -m pytest tests/test_weather_module.py tests/test_et0_module.py -v

      - name: Run Lovelace card tests
        run: |
          python -m pytest tests/test_lovelace_cards.py -v

      - name: Run coordinator logic tests
        run: |
          python -m pytest tests/test_coordinator_logic.py -v

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check custom_components/smartgardn_et0/ --select=E,W,F,N

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          python3 -c "
          import json
          with open('custom_components/smartgardn_et0/manifest.json') as f:
              manifest = json.load(f)
          assert manifest['domain'] == 'smartgardn_et0'
          assert 'name' in manifest
          assert 'version' in manifest
          print('✓ manifest.json is valid')
          "

      - name: Validate HACS config
        run: |
          python3 -c "
          import json
          with open('hacs.json') as f:
              hacs = json.load(f)
          assert 'name' in hacs
          assert 'country' in hacs
          print('✓ hacs.json is valid')
          "
