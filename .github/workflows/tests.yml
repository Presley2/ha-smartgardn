name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate Python syntax
        run: |
          python -m py_compile custom_components/smartgardn_et0/**/*.py custom_components/smartgardn_et0/*.py
          echo "✓ All Python files compile successfully"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check custom_components/smartgardn_et0/ --select=E,W,F,N

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          python3 -c "
          import json
          with open('custom_components/smartgardn_et0/manifest.json') as f:
              manifest = json.load(f)
          assert manifest['domain'] == 'smartgardn_et0'
          assert 'name' in manifest
          assert 'version' in manifest
          print('✓ manifest.json is valid')
          "

      - name: Validate HACS config
        run: |
          python3 -c "
          import json
          with open('hacs.json') as f:
              hacs = json.load(f)
          assert 'name' in hacs
          assert 'country' in hacs
          print('✓ hacs.json is valid')
          "
