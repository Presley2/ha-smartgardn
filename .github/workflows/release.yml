name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          python3 -c "
          import json
          version = '${{ steps.version.outputs.version }}'
          with open('custom_components/smartgardn_et0/manifest.json') as f:
              manifest = json.load(f)
          manifest['version'] = version
          with open('custom_components/smartgardn_et0/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f'✓ Updated manifest to version {version}')
          "

      - name: Build distribution
        run: |
          mkdir -p dist
          cd custom_components/smartgardn_et0
          zip -r ../../dist/smartgardn_et0.zip . -x "*.pyc" "__pycache__/*"
          cd ../..
          echo "✓ Built distribution package"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            # SmartGardn ET₀ v${{ steps.version.outputs.version }}

            This release includes all features for scientific irrigation control based on FAO-56 ET₀ calculations.

            ## Installation

            Via HACS:
            1. Open Home Assistant
            2. Go to HACS > Integrations
            3. Search for "SmartGardn ET₀"
            4. Install the integration
            5. Restart Home Assistant

            ## Files Included

            - Core integration (coordinator, config flow, services)
            - Entity platforms (sensors, switches, selects, numbers, buttons, times)
            - 4 custom Lovelace cards (overview, history, settings, ansaat)
            - Translations (en, de)
            - Diagnostics and repairs

          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/smartgardn_et0.zip
          asset_name: smartgardn_et0-${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip
